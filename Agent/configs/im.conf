# IM Monitor 설정 — inotify + eBPF 구조
daemonize = 1
log_file = /var/log/im_monitor.log
syslog = 0
verbose = 0

# eBPF who-data 추적 (kernel 5.8+에서만 실제 활성화됨)
# 0으로 설정하면 커널 버전 무관하게 비활성
ebpf = 1

[watch]
/etc = recursive
/usr/bin = single

[protect]
/usr/local/bin/agent = file
/etc/im_monitor/im.conf = file
