<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrity Guard</title>
    <link rel="icon" type="image/png" sizes="any" href="assets/images/kn.png">
    <script>
        // 토큰 가드 — 미인증 시 즉시 login으로
        if (!localStorage.getItem('ig.session.token')) {
            location.replace('login.html');
        }
    </script>
    <script src="js/window-size.js"></script>
    <script>
        // 진입 즉시 큰 창으로 확장 (login.html에서 작은 창으로 줄어든 상태일 수 있음)
        TauriWin.setMainSize();
    </script>
    <link rel="stylesheet" href="assets/tailwind.css">
    <style>
        @page {
            size: A4;
            margin: 18mm 16mm;
        }
        @media print {
            html, body {
                background: white !important;
                color: #111827 !important;
                font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            }
            body * { visibility: hidden; }
            #report-modal, #report-modal * { visibility: visible; }

            #report-modal {
                position: absolute !important;
                top: 0; left: 0;
                width: 100% !important;
                height: auto !important;
                padding: 0 !important;
                margin: 0 !important;
                background: white !important;
                display: block !important;
            }
            #report-modal > div {
                max-width: 100% !important;
                max-height: none !important;
                width: 100% !important;
                box-shadow: none !important;
                border: none !important;
                border-radius: 0 !important;
                background: white !important;
            }

            /* Force readable monochrome with selective color preservation */
            #report-modal,
            #report-modal *:not(#report-modal-severity):not(.report-num):not(.report-code) {
                color: #111827 !important;
                background: transparent !important;
            }
            #report-modal-body {
                overflow: visible !important;
                max-height: none !important;
                background: white !important;
                padding: 0 !important;
            }
            #report-modal-body > section {
                page-break-inside: avoid;
                margin-bottom: 22px !important;
            }

            /* Preserve severity badge color */
            #report-modal-severity {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                border: 1px solid currentColor !important;
                background: transparent !important;
            }

            /* Section number badge — print as outlined box, not colored fill */
            .report-num {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                border: 1px solid #1f2937 !important;
                background: transparent !important;
                color: #1f2937 !important;
            }

            .report-code {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color: #1d4ed8 !important;
            }

            .report-divider {
                border-color: #d1d5db !important;
            }

            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors">

    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <h1 class="text-xl font-bold text-gray-900 dark:text-white">Integrity Guard</h1>
            <div class="flex items-center gap-4">
                <div id="connection-status" class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400">
                    <span id="connection-dot" class="w-2 h-2 rounded-full bg-gray-400"></span>
                    <span id="connection-label">Connecting</span>
                </div>
                <button id="theme-toggle" class="p-2 rounded-md text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700" title="Toggle theme">
                    <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 3V5.25M18.364 5.63604L16.773 7.22703M21 12H18.75M18.364 18.364L16.773 16.773M12 18.75V21M7.22703 16.773L5.63604 18.364M5.25 12H3M7.22703 7.22703L5.63604 5.63604M15.75 12C15.75 14.0711 14.0711 15.75 12 15.75C9.92893 15.75 8.25 14.0711 8.25 12C8.25 9.92893 9.92893 8.25 12 8.25C14.0711 8.25 15.75 9.92893 15.75 12Z"/></svg>
                    <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21.7519 15.0021C20.597 15.484 19.3296 15.7501 18 15.7501C12.6152 15.7501 8.25 11.3849 8.25 6.00011C8.25 4.67052 8.51614 3.40308 8.99806 2.24817C5.47566 3.71798 3 7.19493 3 11.2501C3 16.6349 7.36522 21.0001 12.75 21.0001C16.8052 21.0001 20.2821 18.5245 21.7519 15.0021Z"/></svg>
                </button>
                <button id="logout-btn" class="p-2 rounded-md text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700" title="Logout">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75"/></svg>
                </button>
            </div>
            <script>
                document.getElementById('logout-btn').addEventListener('click', async () => {
                    localStorage.removeItem('ig.session.token');
                    await TauriWin.setLoginSize();
                    location.href = 'login.html';
                });
            </script>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-6 flex flex-col gap-6">

        <!-- Agents Card -->
        <section class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700">
                <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Agents</h2>
            </div>

            <!-- Agents Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-50 dark:bg-gray-700/50 text-gray-600 dark:text-gray-400 uppercase text-xs border-b border-gray-200 dark:border-gray-700">
                        <tr>
                            <th class="px-6 py-3">ID</th>
                            <th class="px-6 py-3">Hostname</th>
                            <th class="px-6 py-3">IP</th>
                            <th class="px-6 py-3">Status</th>
                        </tr>
                    </thead>
                    <tbody id="agents-tbody" class="text-gray-900 dark:text-gray-200">
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Integrity Events Card -->
        <section class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700">
                <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Integrity Events</h2>
            </div>

            <!-- Filters & Search -->
            <div class="px-6 py-4 bg-gray-50 dark:bg-gray-800/50 border-b border-gray-200 dark:border-gray-700 flex items-center gap-3 flex-wrap">
                <div id="filter-agent" class="custom-dropdown relative" data-value="">
                    <button type="button" class="border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 text-sm bg-white dark:bg-gray-700 flex items-center gap-2 min-w-[150px] justify-between focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <span class="dropdown-label text-gray-500 dark:text-gray-400">All Agents</span>
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <ul class="dropdown-menu hidden absolute z-10 mt-1 w-full bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-md shadow-lg max-h-48 overflow-y-auto"></ul>
                </div>
                <div id="filter-type" class="custom-dropdown relative" data-value="">
                    <button type="button" class="border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 text-sm bg-white dark:bg-gray-700 flex items-center gap-2 min-w-[150px] justify-between focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <span class="dropdown-label text-gray-500 dark:text-gray-400">All Types</span>
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <ul class="dropdown-menu hidden absolute z-10 mt-1 w-full bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-md shadow-lg max-h-48 overflow-y-auto"></ul>
                </div>
                <div class="flex-1 min-w-[200px] relative">
                    <input
                        id="search-path"
                        type="text"
                        placeholder="Search events..."
                        class="w-full border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 text-sm bg-white dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>
            </div>

            <!-- Events Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-50 dark:bg-gray-700/50 text-gray-600 dark:text-gray-400 uppercase text-xs border-b border-gray-200 dark:border-gray-700">
                        <tr>
                            <th class="px-6 py-3">Time</th>
                            <th class="px-6 py-3">Agent</th>
                            <th class="px-6 py-3">Event</th>
                            <th class="px-6 py-3">Action</th>
                            <th class="px-6 py-3">Report</th>
                        </tr>
                    </thead>
                    <tbody id="events-tbody" class="text-gray-900 dark:text-gray-200">
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="px-6 py-4 border-t border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <span id="page-info" class="text-sm text-gray-500 dark:text-gray-400"></span>
                <div id="pagination" class="flex items-center gap-1">
                </div>
            </div>
        </section>

    </main>

    <!-- Report Modal -->
    <div id="report-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
        <div class="bg-white dark:bg-gray-800 rounded-lg max-w-5xl w-full max-h-[92vh] flex flex-col border border-gray-200 dark:border-gray-700 shadow-2xl">

            <!-- Header -->
            <div class="px-8 py-6 border-b border-gray-200 dark:border-gray-700">
                <div class="flex items-start justify-between gap-4 mb-4">
                    <div>
                        <div class="text-[11px] font-semibold uppercase tracking-[0.18em] text-blue-600 dark:text-blue-400 mb-1">IG Incident Report</div>
                        <h3 class="text-xl font-bold text-gray-900 dark:text-white">무결성 침해 보고서</h3>
                    </div>
                    <div class="flex items-center gap-3 flex-shrink-0">
                        <span id="report-modal-severity" class="px-3 py-1 rounded-full text-xs font-semibold"></span>
                        <button id="report-modal-close" class="no-print text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-2xl leading-none">&times;</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-x-6 gap-y-3 text-xs">
                    <div>
                        <div class="text-gray-500 dark:text-gray-400 mb-0.5">대상 자원</div>
                        <div id="report-modal-path" class="text-gray-900 dark:text-gray-100 font-mono text-[11px] truncate"></div>
                    </div>
                    <div>
                        <div class="text-gray-500 dark:text-gray-400 mb-0.5">호스트</div>
                        <div id="report-modal-host" class="text-gray-900 dark:text-gray-100"></div>
                    </div>
                    <div>
                        <div class="text-gray-500 dark:text-gray-400 mb-0.5">발생 시각</div>
                        <div id="report-modal-time" class="text-gray-900 dark:text-gray-100"></div>
                    </div>
                    <div>
                        <div class="text-gray-500 dark:text-gray-400 mb-0.5">보고서 생성</div>
                        <div id="report-modal-generated" class="text-gray-900 dark:text-gray-100"></div>
                    </div>
                </div>
            </div>

            <!-- Body -->
            <div id="report-modal-body" class="px-8 py-6 overflow-y-auto space-y-8 bg-gray-50/30 dark:bg-gray-900/20"></div>

            <!-- Footer -->
            <div class="no-print px-8 py-4 border-t border-gray-200 dark:border-gray-700 flex items-center justify-end bg-white dark:bg-gray-800 rounded-b-lg">
                <button id="report-print" class="text-sm px-4 py-2 rounded-md font-medium bg-blue-600 text-white hover:bg-blue-700 shadow-sm">PDF 저장</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
