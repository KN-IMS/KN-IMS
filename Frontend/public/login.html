<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Console — Login</title>
    <link rel="icon" type="image/png" sizes="any" href="assets/images/kn.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind CDN은 기본 darkMode='media'(OS 선호 추종) — 로그인 화면은
        // 화이트 고정이므로 'class' 전략으로 바꾸고 .dark 클래스는 부여하지 않음.
        tailwind.config = { darkMode: 'class' };
    </script>
</head>
<body class="bg-white min-h-screen flex flex-col justify-center">

    <div class="px-6 pt-8 pb-2 flex flex-col items-center gap-2">
        <img src="assets/images/kn.png" alt="KN-IG" class="w-12 h-12 rounded-full object-cover">
        <h1 id="title" class="text-xl font-semibold text-gray-900">
            Loading...
        </h1>
        <p id="subtitle" class="text-sm text-gray-500 text-center">
            Connecting to console...
        </p>
    </div>

    <div id="config-error" class="px-6 pt-4 pb-6 flex flex-col gap-3 hidden">
        <p id="config-error-msg" class="text-sm text-red-600 text-center">
            Cannot reach Mirror Server.
        </p>
        <button
            id="config-retry"
            type="button"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium"
        >
            Retry
        </button>
    </div>

    <form id="auth-form" class="px-6 pt-4 pb-6 flex flex-col gap-4 hidden">
        <div>
            <label for="pin-input" class="block text-sm font-medium text-gray-700 mb-1">
                PIN
            </label>
            <input
                id="pin-input"
                type="password"
                inputmode="numeric"
                autocomplete="off"
                autofocus
                maxlength="8"
                pattern="[0-9]{4,8}"
                class="w-full border border-gray-300 rounded-md px-3 py-2 text-base bg-white tracking-widest text-center font-mono focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
        </div>

        <div id="confirm-wrap" class="hidden">
            <label for="pin-confirm" class="block text-sm font-medium text-gray-700 mb-1">
                Confirm PIN
            </label>
            <input
                id="pin-confirm"
                type="password"
                inputmode="numeric"
                autocomplete="off"
                maxlength="8"
                pattern="[0-9]{4,8}"
                class="w-full border border-gray-300 rounded-md px-3 py-2 text-base bg-white tracking-widest text-center font-mono focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
        </div>

        <p id="error-msg" class="text-sm text-red-600 hidden"></p>

        <button
            id="submit-btn"
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium disabled:bg-gray-400 disabled:cursor-not-allowed"
        >
            Continue
        </button>

        <p id="pin-helper" class="text-xs text-gray-400 text-center hidden">
            PIN must be 4-8 digits.
        </p>
    </form>

    <div id="locked-msg" class="px-6 pt-4 pb-8 hidden">
        <p class="text-sm text-red-600 text-center">
            Console is locked. Try again later.
        </p>
    </div>

    <script src="config.js"></script>
    <script src="js/window-size.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
